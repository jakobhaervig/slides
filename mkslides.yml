index:
  title: Jakob Hærvig's Slidedecks
  favicon: https://jakobhaervig.com/cdn/favicon/favicon.ico
  theme: https://jakobhaervig.com/cdn/styles/reveal-js/index.css
  template: docs/index.html.jinja

slides:
  highlight_theme: vs
  separator: ^\s*---\s*$
  separator_vertical: ^\s*-v-\s*$
  separator_notes: "^Notes?:"
  favicon: https://jakobhaervig.com/cdn/favicon/favicon.ico
  theme: https://jakobhaervig.com/cdn/styles/reveal-js/slides.css
  template: docs/slides.html.jinja

revealjs:
  height: 1080
  width: 1920
  transition: fade

plugins:
  - name: RevealMermaid
    extra_javascript:
      - https://cdn.jsdelivr.net/npm/reveal.js-mermaid-plugin/plugin/mermaid/mermaid.min.js
  - extra_javascript:
      - https://cdn.jsdelivr.net/npm/reveal-plantuml/dist/reveal-plantuml.min.js
